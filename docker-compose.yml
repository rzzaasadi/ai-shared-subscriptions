services:
  postgres:
    image: postgres:16
    container_name: ai-platform-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ai_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai-platform-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: